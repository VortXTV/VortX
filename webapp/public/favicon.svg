<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="VortX">
  <rect width="200" height="200" rx="44" fill="#15120e" />
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9163" />
      <stop offset="0.55" stop-color="#f2784b" />
