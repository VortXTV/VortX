# Single Gradle-version truth for the Android build. AGP 8.10 (pinned in gradle/libs.versions.toml)
# requires Gradle >= 8.11.1, so the distribution is pinned to 8.11.1. CI builds via ./gradlew, so this
# file, not any CI setup step, decides the Gradle version. Bump in lockstep with an AGP bump.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
